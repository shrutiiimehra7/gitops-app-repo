apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: deploy-app
  namespace: default
spec:
  params:
  - name: app-name
    type: string
  - name: image-tag
    type: string
    default: "v1"
  - name: registry
    type: string
    default: "localhost:5000"
  steps:
  - name: deploy
    image: bitnami/kubectl:latest
    script: |
      #!/bin/bash
      echo "🚀 Deploying $(params.app-name):$(params.image-tag)..."
      kubectl set image deployment/$(params.app-name) \
        $(params.app-name)=$(params.registry)/$(params.app-name):$(params.image-tag)
      echo "⏳ Waiting for rollout..."
      kubectl rollout status deployment/$(params.app-name) --timeout=120s
      echo "✅ $(params.app-name) deployed successfully!"
      echo ""
      echo "📊 Current pods:"
      kubectl get pods -l app=$(params.app-name)
