# Nginx serves the Angular static build in production.
# This config is optimised for a Kubernetes sidecar with health checks.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Log format: structured for easy parsing
    log_format json_combined escape=json
      '{"time":"$time_iso8601",'
      '"method":"$request_method",'
      '"uri":"$request_uri",'
      '"status":$status,'
      '"bytes_sent":$bytes_sent,'
      '"request_time":$request_time,'
      '"remote_addr":"$remote_addr"}';

    access_log /dev/stdout json_combined;
    error_log  /dev/stderr warn;

    # Health check endpoint — used by Kubernetes readiness probe
    location /health {
        return 200 '{"status":"healthy","service":"angular-frontend"}';
        add_header Content-Type application/json;
    }

    # Angular uses HTML5 routing — all routes must return index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (they are fingerprinted by Angular CLI)
    location ~* \.(js|css|png|jpg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
