apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: maven-build
  namespace: default
spec:
  workspaces:
    - name: source
  params:
    - name: context-path
      type: string
      default: "."
  steps:
    - name: mvn-package
      image: eclipse-temurin:17-jdk-alpine
      script: |
        #!/bin/sh
        set -e
        apk add --no-cache maven
        cd $(workspaces.source.path)/$(params.context-path)
        echo "Running Maven build..."
        mvn package -DskipTests --no-transfer-progress
        echo "Maven build complete. JAR files:"
        ls target/*.jar
